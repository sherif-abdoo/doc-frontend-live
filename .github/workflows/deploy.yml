name: Deploy Frontend

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH (build on server)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            bash -lc '
              set -euo pipefail
              set -x

              # 1. Setup Environment
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              nvm use 20 >/dev/null 2>&1 || nvm install 20

              # 2. Update Source
              cd "${{ secrets.FRONTEND_PATH }}"
              git fetch --all
              git reset --hard origin/main

              # 3. Create Production Env
              cat > .env.production << EOF
              REACT_APP_API_BASE=
              REACT_APP_ADMIN_PASSKEY=DOCADMIN
              REACT_APP_PRESIGN_URL=https://r2-presign.dok-uploads.workers.dev
              REACT_APP_R2_READER_BASE=https://r2-read.dok-uploads.workers.dev
              EOF

              # 4. Install & Build
              if [ -f package-lock.json ]; then
                npm ci
              else
                npm install
              fi
              
              npm run build

              # 5. Verify Build Output
              test -d build || (echo "ERROR: build/ folder not found!" && exit 3)

              # 6. Deploy to Nginx Root
              # Note: We remove the trailing slash from the target to ensure direct sync
              TARGET_DIR="${{ secrets.NGINX_WEB_ROOT }}"
              sudo rsync -avz --delete build/ "$TARGET_DIR"

              # 7. Fix Permissions (Crucial for Nginx access)
              sudo chown -R www-data:www-data "$TARGET_DIR"
              sudo find "$TARGET_DIR" -type d -exec chmod 755 {} +
              sudo find "$TARGET_DIR" -type f -exec chmod 644 {} +

              # 8. Reload Nginx
              sudo nginx -t
              sudo systemctl reload nginx

              echo "Deployment Successful!"
              ls -la "$TARGET_DIR" | head -n 10
            '